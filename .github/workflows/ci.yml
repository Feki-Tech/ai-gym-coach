name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  selftest:
    name: selftest (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run selftest suite
        run: python pose_coach.py --selftest

  docker:
    name: docker build + containerized selftest
    runs-on: ubuntu-latest
    needs: selftest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ai-gym-coach:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Selftest inside container
        run: docker run --rm ai-gym-coach:ci --selftest
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/feki-tech/ai-gym-coach:latest
            ghcr.io/feki-tech/ai-gym-coach:${{ github.sha }}
          cache-from: type=gha
