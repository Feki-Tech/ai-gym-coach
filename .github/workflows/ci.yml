name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  selftest:
    name: selftest (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libgles2 libegl1 libglib2.0-0 espeak-ng
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run selftest suite
        run: python pose_coach.py --selftest

  docker:
    name: docker build + containerized selftest
    runs-on: ubuntu-latest
    needs: selftest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ai-gym-coach:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Selftest inside container
        run: docker run --rm ai-gym-coach:ci --selftest
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/feki-tech/ai-gym-coach:latest
            ghcr.io/feki-tech/ai-gym-coach:${{ github.sha }}
          cache-from: type=gha

  ios:
    name: iOS — CoachCore tests + app build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: CoachCore unit tests
        run: swift test --package-path ios/CoachCore
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec ios/GymCoach/project.yml --project ios/GymCoach
      - name: Build app for iOS Simulator
        run: >
          xcodebuild build
          -project ios/GymCoach/GymCoach.xcodeproj
          -scheme GymCoach
          -destination 'generic/platform=iOS Simulator'
          -configuration Debug
          CODE_SIGNING_ALLOWED=NO
          -quiet
