# XcodeGen project spec — run `xcodegen generate` in this directory.
# https://github.com/yonaskolb/XcodeGen

name: GymCoach
options:
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  CoachCore:
    path: ../CoachCore

targets:
  GymCoach:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    dependencies:
      - package: CoachCore
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: AI Gym Coach
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
          - hi
          - es
          - fr
          - ar
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        NSCameraUsageDescription: >-
          AI Gym Coach analyzes your exercise form live through the camera.
          Video is processed entirely on this device and is never stored or
          uploaded.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.fekitech.gymcoach
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
      gatherCoverageData: false
